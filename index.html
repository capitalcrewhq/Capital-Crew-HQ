function getWeekDates() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return DAYS.map((d, i) => {
    const dt = new Date(mon);

    return { name: d, date: dt.getDate() + "/" + (dt.getMonth()+1), isoDate: dt.toISOString().slice(0,10) };

// Firebase
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const stateRef = ref(db, "appState");

let state = null;
let saveTimer = null;

onValue(stateRef, (snapshot) => {

function persist(newState) {

// ── Date helpers ──
function parseDate(str) {
  if (!str || str.trim().toUpperCase() === "TBD" || !str.trim()) return null;
  const d = new Date(str.trim());
  if (!isNaN(d)) return d;
  const m = str.trim().match(/^([A-Za-z]+)\s+(\d{4})$/);
  if (m) { const d2 = new Date(m[1]+" 1, "+m[2]); if (!isNaN(d2)) return d2; }
  return null;
}
function daysUntil(date) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function getAttnItems() {
  if (!state) return [];
  const items = [];
  const now = new Date(); now.setHours(0,0,0,0);
  const cutoff = new Date(now); cutoff.setDate(cutoff.getDate()+60);
  (state.trips||[]).forEach(t => {
    if (t.status==="Done") return;
    const d = parseDate(t.date);
    if (d && d>=now && d<=cutoff) { const days=daysUntil(d); items.push({dot:days<=14?"red":days<=30?"orange":"yellow",title:"Trip: "+t.org,sub:t.date+" · "+days+" days away · "+t.status}); }
  });
  (state.comps||[]).forEach(c => {
    if (c.status==="Done") return;
    [{k:"signup",l:"Sign-up deadline"},{k:"date",l:"Competition date"}].forEach(({k,l}) => {
      const d = parseDate(c[k]);
      if (d && d>=now && d<=cutoff) { const days=daysUntil(d); items.push({dot:days<=14?"red":days<=30?"orange":"yellow",title:c.name+" — "+l,sub:c[k]+" · "+days+" days away"}); }
    });
  });
  (state.tasks||[]).filter(t=>t.cat==="Important"&&!t.done).forEach(t => {
    items.push({dot:"red",title:t.text,sub:"Important task · "+t.member});
  });
  return items;
}

  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
}

function buildCalendar() {
  const weeks = getWeekDates();
  const cal = state.calendar||{};
  const now = new Date();
  const todayIso = now.toISOString().slice(0,10);
  return `
  <div class="phdr"><div class="phdr-left"><h1>Content calendar</h1><p>This week's video schedule. Resets automatically every Monday.</p></div></div>
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">

  </div>
  <div class="cal-grid">
    ${weeks.map(day => {
      const slots = (cal[day.isoDate]||[]);
      const isToday = day.isoDate===todayIso;
      return `<div class="cal-day" style="${isToday?"border-color:rgba(0,229,160,0.3);":""}">
        <div class="cal-day-hdr" style="${isToday?"background:rgba(0,229,160,0.08);":""}">
          <span class="cal-day-name" style="${isToday?"color:#00e5a0;":""}">${day.name}</span>
          <span class="cal-day-date">${day.date}</span>
        </div>
        <div class="cal-slots">
          ${slots.map((slot,si)=>`
            <div class="cal-slot" style="background:${CT_B[slot.type]||'#1a1a1a'};border-color:${CT_BR[slot.type]||'#2a2a2a'};" data-edit-slot="${day.isoDate}" data-slot-idx="${si}">
              <div class="cal-slot-type" style="color:${CT_C[slot.type]||'#888'};">${slot.type}</div>
              <div class="cal-slot-who">${slot.who}</div>
              ${slot.note?`<div class="cal-slot-note">${slot.note}</div>`:""}
              <button class="del-btn" data-del-slot="${day.isoDate}" data-slot-idx="${si}" style="position:absolute;top:4px;right:4px;font-size:10px;padding:0 3px;">✕</button>
            </div>`).join("")}
          <button class="cal-add-slot" data-add-slot="${day.isoDate}">+ Add video</button>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function closeModal() {
  document.getElementById("modal-bg").style.display = "none";
  document.getElementById("modal-bg").innerHTML = "";
  modalType = null; modalExtra = {};
}

function saveModal() {
  const g = id => (document.getElementById(id)||{}).value||"";
  if (modalType==="trip") {
    persist({...state,trips:[...(state.trips||[]),{id:Date.now(),org:g("m-org")||"New org",date:g("m-date")||"TBD",capacity:g("m-cap")||"—",contact:g("m-contact")||"—",status:g("m-status")||"Idea",notes:g("m-notes")||""}]});
  } else if (modalType==="comp") {
    persist({...state,comps:[...(state.comps||[]),{id:Date.now(),name:g("m-name")||"New competition",signup:g("m-signup")||"TBD",date:g("m-date")||"TBD",team:g("m-team")||"—",status:g("m-cstatus")||"Need dates"}]});
  } else if (modalType==="task") {
    const text=g("m-task"); if(!text.trim()){closeModal();return;}
    persist({...state,tasks:[...(state.tasks||[]),{id:Date.now(),member:g("m-member")||"Abdullah",text,cat:g("m-cat")||"Other",done:false}]});
  } else if (modalType==="outreach") {
    const name=g("m-or-name"); if(!name.trim()){closeModal();return;}
    const newContact={id:Date.now(),name,org:g("m-or-org"),stage:g("m-or-stage")||"Not contacted",lastContact:g("m-or-last"),followUp:g("m-or-followup"),notes:g("m-or-notes")};
    persist({...state,outreach:[...(state.outreach||[]),newContact]});
  } else if (modalType==="calSlot") {
    const isoDate = modalExtra.isoDate;
    const typeCustom = g("m-cal-type-custom").trim();
    const whoCustom = g("m-cal-who-custom").trim();
    const type = typeCustom || g("m-cal-type") || "Other";
    const who = whoCustom || g("m-cal-who") || "TBD";
    const note = g("m-cal-note");
    const newSlot = {type,who,note};
    const cal = JSON.parse(JSON.stringify(state.calendar||{}));
    if (!cal[isoDate]) cal[isoDate]=[];
    cal[isoDate].push(newSlot);
    persist({...state,calendar:cal});
  }
  closeModal();
}

  if(nsAdd)nsAdd.onclick=()=>{const inp=document.getElementById("nstep-new");const catEl=document.getElementsByName("nstep-new-cat")[0];if(inp&&inp.value.trim())persist({...state,nsteps:[...(state.nsteps||[]),{id:Date.now(),text:inp.value.trim(),cat:catEl?.value||"Social",done:false}]});};
  const nsInp=document.getElementById("nstep-new");
  if(nsInp)nsInp.onkeydown=e=>{if(e.key==="Enter"){const catEl=document.getElementsByName("nstep-new-cat")[0];if(nsInp.value.trim())persist({...state,nsteps:[...(state.nsteps||[]),{id:Date.now(),text:nsInp.value.trim(),cat:catEl?.value||"Social",done:false}]});}};

  // Outreach
  const orAddBtn=document.getElementById("outreach-add-btn");if(orAddBtn)orAddBtn.onclick=()=>openModal("outreach");
  C.querySelectorAll("[data-or-field]").forEach(el=>el.onchange=()=>{const id=parseInt(el.dataset.orId),field=el.dataset.orField;persist({...state,outreach:(state.outreach||[]).map(o=>o.id===id?{...o,[field]:el.value}:o)});});
  C.querySelectorAll("[data-or-status]").forEach(el=>el.onchange=()=>{const id=parseInt(el.dataset.orStatus);persist({...state,outreach:(state.outreach||[]).map(o=>o.id===id?{...o,stage:el.value}:o)});});
  C.querySelectorAll("[data-del-or]").forEach(el=>el.onclick=()=>persist({...state,outreach:(state.outreach||[]).filter(o=>o.id!==parseInt(el.dataset.delOr))}));

  // Calendar
  C.querySelectorAll("[data-add-slot]").forEach(el=>el.onclick=()=>{
    const isoDate=el.dataset.addSlot;
    const dayInfo=getWeekDates().find(d=>d.isoDate===isoDate);
    openModal("calSlot",{isoDate,dayName:dayInfo?dayInfo.name+" "+dayInfo.date:isoDate});
  });
  C.querySelectorAll("[data-del-slot]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const isoDate=el.dataset.delSlot,idx=parseInt(el.dataset.slotIdx);
    const cal=JSON.parse(JSON.stringify(state.calendar||{}));
    if(cal[isoDate]){cal[isoDate].splice(idx,1);if(!cal[isoDate].length)delete cal[isoDate];}
    persist({...state,calendar:cal});
  });

  // Mobile nav
  const hamBtn=document.getElementById("ham-open");
  const mobNav=document.getElementById("mob-nav");
  const mobClose=document.getElementById("mob-nav-close");
  if(hamBtn)hamBtn.onclick=()=>{mobNav.classList.add("open");};
  if(mobClose)mobClose.onclick=()=>{mobNav.classList.remove("open");};
  C.querySelectorAll("[data-mob]").forEach(el=>el.onclick=()=>{currentPage=el.dataset.page;mobNav.classList.remove("open");render();});

  // Social
  const socBtn=document.getElementById("soc-update");
  if(socBtn)socBtn.onclick=()=>{const vids=parseInt(document.getElementById("soc-vids").value)||0,tiktok=parseInt(document.getElementById("soc-tiktok").value)||0,insta=parseInt(document.getElementById("soc-insta").value)||0;persist({...state,social:{vids,tiktok,insta}});};
}

// ── Password ──
window.checkPassword = function() {
  const input=document.getElementById("pw-input").value;
  const err=document.getElementById("pw-error");
  if(input===PASSWORD){document.getElementById("gate").style.display="none";document.getElementById("app").style.display="block";render();}
  else{err.style.display="block";}
};
</script>
</head>
<body>
<div id="gate">
  <div class="gate-box">
    <div class="gate-title">Capital Crew HQ</div>
    <div class="gate-sub">Enter passcode to access command center</div>
    <input type="password" id="pw-input" class="gate-input" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="gate-btn" onclick="checkPassword()">Unlock Dashboard</button>
    <div id="pw-error" class="gate-error">Incorrect password. Try again.</div>
  </div>
</div>
<div id="app"></div>
<div id="modal-bg" style="position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;"></div>
</body>
</html>
